<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Цагаан сарын мэндчилгээ</title>
  <style>
    :root{
      --bg1:#070614; --bg2:#0b0a1e;
      --gold1:#f7d37a; --gold2:#b88a2a;
      --card:#0f1026cc; --text:#f6f2e8;
      --muted:#cbbda5; --accent:#ffdb8a;
      --shadow: 0 24px 60px rgba(0,0,0,.55);
      --radius: 18px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);
      background:
        radial-gradient(1200px 800px at 20% 20%, #1a1340 0%, transparent 55%),
        radial-gradient(900px 600px at 80% 30%, #2a1b38 0%, transparent 50%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }
    .pattern{
      position:fixed; inset:0; pointer-events:none;
      opacity:.14;
      background:
        radial-gradient(circle at 20px 20px, rgba(255,219,138,.55) 2px, transparent 3px) 0 0 / 44px 44px,
        radial-gradient(circle at 22px 22px, rgba(255,219,138,.25) 1px, transparent 2px) 0 0 / 44px 44px;
      mix-blend-mode: screen;
    }
    .wrap{
      min-height:100%;
      display:flex; align-items:center; justify-content:center;
      padding: 24px 14px;
      position:relative; z-index:2;
    }
    .card{
      width:min(820px, 100%);
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border:1px solid rgba(255,219,138,.18);
      position:relative; overflow:hidden;
    }
    .card::before{
      content:""; position:absolute; inset:-2px; z-index:0;
      background: conic-gradient(from 180deg,
        rgba(247,211,122,.05),
        rgba(247,211,122,.35),
        rgba(184,138,42,.15),
        rgba(247,211,122,.35),
        rgba(247,211,122,.05)
      );
      filter: blur(10px); opacity:.9;
    }
    .card::after{
      content:""; position:absolute; inset:1px; z-index:0;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border-radius: calc(var(--radius) - 2px);
    }
    .content{ position:relative; z-index:1; padding: 22px 18px 18px; }

    .pill{
      display:inline-flex; gap:10px; align-items:center;
      padding:10px 14px; border-radius:999px;
      background: rgba(255,219,138,.10);
      border:1px solid rgba(255,219,138,.22);
      color: var(--accent);
      font-weight: 900;
      letter-spacing:.2px;
    }
    h1{
      margin: 14px 0 8px;
      font-size: clamp(24px, 4.0vw, 40px);
      line-height:1.05;
    }
    .sub{ margin:0 0 14px; color: var(--muted); line-height:1.55; font-size: 14px; }

    .box{
      border-radius: 14px;
      border: 1px solid rgba(255,219,138,.14);
      background: rgba(10,10,20,.35);
      padding: 14px;
    }

    /* login form */
    .form{
      display:grid;
      gap:10px;
      max-width: 520px;
    }
    label{ font-size: 12px; color: var(--muted); }
    input{
      width:100%;
      padding:11px 12px;
      border-radius:12px;
      border:1px solid rgba(255,219,138,.18);
      background: rgba(0,0,0,.18);
      color: var(--text);
      outline:none;
    }
    input:focus{
      border-color: rgba(255,219,138,.38);
      box-shadow:0 0 0 4px rgba(255,219,138,.10);
    }

    /* image */
    .imgFrame{
      border-radius: 14px;
      border: 1px solid rgba(255,219,138,.18);
      background: rgba(0,0,0,.18);
      overflow: hidden;
      margin: 12px 0;
    }
    .imgFrame img{
      width:100%;
      max-height: 360px;
      object-fit: cover;
      display:block;
    }

    .msg{
      font-size: 15px;
      line-height:1.6;
      white-space: pre-wrap;
      user-select:text;
      margin:0;
    }

    .row{
      display:flex; gap:10px; flex-wrap:wrap;
      align-items:center; justify-content:space-between;
      margin-top: 12px;
    }

    .btns{ display:flex; gap:10px; flex-wrap:wrap; }
    button{
      border:none; cursor:pointer;
      border-radius: 12px;
      padding: 11px 14px;
      font-weight: 900;
      letter-spacing:.2px;
      color:#221a07;
      background: linear-gradient(180deg, var(--gold1), var(--gold2));
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
      transition: transform .08s ease, filter .2s ease;
    }
    button:active{ transform: translateY(1px) scale(.99); }
    button.secondary{
      color: var(--text);
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,219,138,.16);
      box-shadow:none;
      font-weight:800;
    }

    .tiny{ margin-top: 10px; color: var(--muted); font-size: 12px; display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; }

    .toast{
      position: fixed;
      left:50%;
      bottom: 18px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,219,138,.22);
      color: var(--text);
      backdrop-filter: blur(8px);
      opacity:0;
      pointer-events:none;
      transition: opacity .25s ease, transform .25s ease;
      z-index: 50;
      font-size: 13px;
    }
    .toast.show{ opacity:1; transform: translateX(-50%) translateY(-6px); }

    .hide{ display:none !important; }
    .error{ color: #ffd1d1; font-size: 13px; }
  </style>
</head>
<body>
  <div class="pattern"></div>

  <div class="wrap">
    <div class="card">
      <div class="content">
        <div class="pill"></div>

        <!-- ✅ LOGIN SCREEN -->
        <section id="loginScreen">
          <h1>Нэрээ оруулаад нэвтэрнэ үү</h1>
          <p class="sub">Нэр + нууц үг зөв бол мэндчилгээ гарна.</p>

          <div class="box">
            <div class="form">
              <div>
                <label for="loginName">Нэр</label>
                <input id="loginName" type="text" placeholder="Өөрийн бүтэн нэрээ оруулна уу:" autocomplete="name">
              </div>
              <div>
                <label for="loginPass">Нууц үг</label>
                <input id="loginPass" type="password" placeholder="Нууц үг" autocomplete="current-password">
              </div>

              <div class="row">
                <div class="btns">
                  <button id="loginBtn" type="button">Нэвтрэх</button>
                  <button id="clearBtn" class="secondary" type="button">Цэвэрлэх</button>
                </div>
                <span class="error" id="loginError"></span>
              </div>

              <p class="sub" style="margin:0">
                Нууц үг бид 2 ийн танилцсан өдөр.
              </p>
            </div>
          </div>
        </section>

        <!-- ✅ GREETING SCREEN -->
        <section id="greetScreen" class="hide">
          <div class="pill" id="modePill">Цагаан сар — мэндчилгээ</div>
          <h1 id="title">Сар шинэдээ сайхан шинэлээрэй 🤍✨</h1>
          <p class="sub" id="sub">Таны нэрээр зураг сонгогдсон мэндчилгээ.</p>

          <div class="box">
            <div class="imgFrame">
              <img id="heroImg" alt="Мэндчилгээний зураг">
            </div>

            <p class="msg" id="msg"></p>

            <div class="row">
              <div class="btns">
                <button id="shareBtn" type="button">Share</button>
                <button id="waBtn" class="secondary" type="button">WhatsApp</button>
                <button id="copyBtn" class="secondary" type="button">Copy</button>
                <button id="logoutBtn" class="secondary" type="button">Гарах</button>
              </div>
              <span class="sub" style="margin:0" id="who"></span>
            </div>
          </div>

          <div class="tiny">
            <span id="modeInfo"></span>
            <span id="dateInfo"></span>
          </div>
        </section>

      </div>
    </div>
  </div>

  <div class="toast" id="toast">OK ✅</div>

  <script>
    /*********************************************************
     * 1) ТОХИРУУЛГА
     *********************************************************/
    // Шинийн 1 - Gregorian огноо
    const TSAGAAN_SAR_SHINII_1 = "2026-02-17"; // YYYY-MM-DD

    // ✅ НУУЦ ҮГ (ЭНД СОЛИНО)
    const PASSWORD = "1234"; // <-- өөрийн нууц үг

    /*********************************************************
     * 2) НЭРЭЭС ХАМААРАХ ЗУРГИЙН МАП
     * - Түлхүүр: нэр (жишээ нь "Ээж", "Аав")
     * - Утга: зурагны зам (img/...)
     *
     * Та өөрийнхөө “танайхны” нэрээр зургаа нэмээд явна.
     *********************************************************/
    const IMAGE_BY_NAME = {
      "Оюунбилэг": "Оюунбилэг.jpg",
      "Энхжаргал": "Энхжаргал.jpg",
      "Сувд-Эрдэнэ": "Сувд-Эрдэнэ.jpg",
      "Эгч": "Hamt_Olon.jpg",
      "Найз": "Hamt_Olon.jpg"
    };

    // Хэрвээ нэр нь таарахгүй бол энэ зураг гарна
    const DEFAULT_IMAGE = "img/default.jpg";

    /*********************************************************
     * Helpers
     *********************************************************/
    const $ = (id)=>document.getElementById(id);
    const toast = $("toast");

    function showToast(t){
      toast.textContent = t;
      toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(()=>toast.classList.remove("show"), 1500);
    }
    function pad(n){ return String(n).padStart(2,"0"); }
    function parseYMD(ymd){
      const [y,m,d] = ymd.split("-").map(Number);
      return new Date(y, m-1, d, 12, 0, 0);
    }
    function formatDate(d){
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }
    function addDays(date, days){
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }
    function normName(s){
      return (s || "").trim();
    }

    /*********************************************************
     * Mode (Битүүн / Шинийн 1 / Ердийн)
     *********************************************************/
    const shinii1 = parseYMD(TSAGAAN_SAR_SHINII_1);
    const bituun = addDays(shinii1, -1);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 0, 0);

    const isBituun = formatDate(today) === formatDate(bituun);
    const isShinii1 = formatDate(today) === formatDate(shinii1);

    const bituunMsg =
`Битүүний орой “Бүтэн мэнд” хүргэе! 🌙✨
Хуучин оноо үдэж, шинэ оноо угтах гэж буй энэ сайхан өдөр
эрүүл энх, элбэг дэлбэг, амар амгалан бүхнийг хүсье.
Сар шинэдээ сайхан шинэлээрэй! 🤍`;

    const shiniiMsg =
`Сар шинэдээ сайхан шинэлээрэй! 🤍✨
Шинэ ондоо эрүүл энх, амжилт бүтээл, аз жаргал дүүрэн байхыг хүсье.
Амар амгалан байг!`;

    function buildMessage(name){
      const base = isBituun ? bituunMsg : shiniiMsg;
      if(!name) return base;
      return `${name} ,\n${base}`;
    }

    function modeTitle(){
      if(isBituun) return { pill:"Битүүний өдөр — “Бүтэн мэнд”", title:"Бүтэн мэнд хүргэе 🌙✨", mode:"Битүүн" };
      if(isShinii1) return { pill:"Шинийн 1 — мэндчилгээ", title:"Сар шинэдээ сайхан шинэлээрэй 🤍✨", mode:"Шинийн 1" };
      return { pill:"Цагаан сар — мэндчилгээ", title:"Сар шинэдээ сайхан шинэлээрэй 🤍✨", mode:"Ердийн" };
    }

    /*********************************************************
     * ✅ Login logic (simple)
     *********************************************************/
    const loginScreen = $("loginScreen");
    const greetScreen = $("greetScreen");
    const loginName = $("loginName");
    const loginPass = $("loginPass");
    const loginBtn = $("loginBtn");
    const clearBtn = $("clearBtn");
    const loginError = $("loginError");

    const heroImg = $("heroImg");
    const msgEl = $("msg");
    const titleEl = $("title");
    const modePill = $("modePill");
    const modeInfo = $("modeInfo");
    const dateInfo = $("dateInfo");
    const who = $("who");

    // remember only the name (not password)
    const NAME_KEY = "tsagaan_sar_login_name_v1";
    const savedName = localStorage.getItem(NAME_KEY);
    if(savedName) loginName.value = savedName;

    function pickImageByName(name){
      // яг таг таарах нэр бол тэр зураг
      if(IMAGE_BY_NAME[name]) return IMAGE_BY_NAME[name];

      // жижиг/том үсгээс болж алдвал гэж: closest match (case-insensitive)
      const lower = name.toLowerCase();
      for(const k of Object.keys(IMAGE_BY_NAME)){
        if(k.toLowerCase() === lower) return IMAGE_BY_NAME[k];
      }
      return DEFAULT_IMAGE;
    }

    function enterGreeting(name){
      const mt = modeTitle();
      modePill.textContent = mt.pill;
      titleEl.textContent = mt.title;
      modeInfo.textContent = `Горим: ${mt.mode}`;
      dateInfo.textContent = `Өнөөдөр: ${formatDate(today)}`;

      who.textContent = `Нэр: ${name}`;
      msgEl.textContent = buildMessage(name);

      const imgSrc = pickImageByName(name);
      heroImg.onerror = () => { heroImg.src = DEFAULT_IMAGE; };
      heroImg.src = imgSrc;

      loginScreen.classList.add("hide");
      greetScreen.classList.remove("hide");
      showToast("Нэвтэрлээ ✅");
    }

    function doLogin(){
      loginError.textContent = "";
      const name = normName(loginName.value);
      const pass = loginPass.value;

      if(!name){
        loginError.textContent = "Нэрээ оруулна уу.";
        return;
      }
      if(pass !== PASSWORD){
        loginError.textContent = "Нууц үг буруу байна.";
        return;
      }

      localStorage.setItem(NAME_KEY, name);
      enterGreeting(name);
    }

    loginBtn.addEventListener("click", doLogin);
    loginPass.addEventListener("keydown", (e)=>{ if(e.key === "Enter") doLogin(); });
    clearBtn.addEventListener("click", ()=>{
      loginName.value = "";
      loginPass.value = "";
      loginError.textContent = "";
      localStorage.removeItem(NAME_KEY);
      showToast("Цэвэрлэв");
    });

    $("logoutBtn").addEventListener("click", ()=>{
      // go back to login
      greetScreen.classList.add("hide");
      loginScreen.classList.remove("hide");
      loginPass.value = "";
      showToast("Гарлаа");
    });

    /*********************************************************
     * Share / WhatsApp / Copy
     *********************************************************/
    async function copyText(text){
      try{
        await navigator.clipboard.writeText(text);
        showToast("Хууллаа ✅");
      }catch{
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        showToast("Хууллаа ✅");
      }
    }
    $("copyBtn").addEventListener("click", ()=>{
      const name = localStorage.getItem(NAME_KEY) || "";
      copyText(buildMessage(name));
    });
    $("waBtn").addEventListener("click", ()=>{
      const name = localStorage.getItem(NAME_KEY) || "";
      const text = encodeURIComponent(buildMessage(name));
      window.open(`https://wa.me/?text=${text}`, "_blank", "noopener,noreferrer");
    });
    $("shareBtn").addEventListener("click", async ()=>{
      const name = localStorage.getItem(NAME_KEY) || "";
      const text = buildMessage(name);
      try{
        if(navigator.share){
          await navigator.share({ title: titleEl.textContent, text });
          showToast("Share ✅");
        } else {
          await copyText(text);
        }
      } catch {
        showToast("Цуцлагдсан");
      }
    });

    // Optional: auto-enter if user already typed name before (but still require password)
    // No auto login for safety.
  </script>
</body>
</html>
